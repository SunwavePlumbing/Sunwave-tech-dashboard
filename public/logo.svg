<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 73 108">
  <!-- Charcoal background (the border/frame) -->
  <rect width="73" height="108" fill="#383838"/>

  <!-- White sky (inset top rectangle) -->
  <rect x="3.5" y="3.5" width="66" height="58" fill="white"/>

  <!-- Light blue water (inset bottom rectangle) -->
  <rect x="3.5" y="64" width="66" height="40.5" fill="#b8d9ea"/>

  <!-- Orange sun fill — drawn before wave so wave covers lower half -->
  <circle cx="36.5" cy="52" r="18" fill="#F07030"/>

  <!-- Dark sun ring (outer) — thick charcoal outline -->
  <circle cx="36.5" cy="52" r="23" fill="none" stroke="#383838" stroke-width="5.5"/>

  <!-- Dark wave band — sweeps left to right, covers bottom of sky/sun and top of water -->
  <path d="M3.5 51 C14 45 24 58 36.5 52 C49 46 60 55 69.5 48
           L69.5 70 C60 77 49 68 36.5 74 C24 80 14 71 3.5 78 Z"
        fill="#383838"/>

  <!-- White foam stripe — runs through the middle of the wave band -->
  <path d="M3.5 59 C14 53 24 66 36.5 60 C49 54 60 63 69.5 56
           L69.5 64 C60 71 49 62 36.5 68 C24 74 14 65 3.5 72 Z"
        fill="white"/>
</svg>
