<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sunwave KPI Diagnostics</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #667085;
      --line: #d8dde6;
      --soft: #f6f7f9;
      --brand: #e9833f;
      --green: #21865b;
      --red: #b42318;
      --amber: #b26a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #fff;
    }
    header {
      padding: 28px 20px 18px;
      border-bottom: 1px solid var(--line);
    }
    .wrap { max-width: 1180px; margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: 28px; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); line-height: 1.45; }
    main { padding: 20px; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #344054;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input, select, button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
    }
    button {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }
    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-6 { grid-column: span 6; }
    .hint { font-size: 13px; margin-top: 10px; color: var(--muted); }
    .status {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--ink);
    }
    .status.show { display: block; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .metric b { display: block; font-size: 22px; margin-top: 4px; }
    .candidate {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
      background: #fff;
    }
    .candidate-head {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: 12px;
      padding: 14px;
      background: var(--soft);
      border-bottom: 1px solid var(--line);
    }
    .candidate-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 14px;
    }
    .label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .value { margin-top: 3px; font-weight: 700; overflow-wrap: anywhere; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #eef2f6;
      color: #344054;
      margin: 3px 4px 3px 0;
    }
    .pill.good { background: #e8f5ee; color: var(--green); }
    .pill.warn { background: #fff4dd; color: var(--amber); }
    .pill.bad { background: #fde9e7; color: var(--red); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 8px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    details {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfd;
    }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.45;
    }
    @media (max-width: 820px) {
      .grid, .summary, .candidate-head, .candidate-body { grid-template-columns: 1fr; }
      .span-2, .span-3, .span-6 { grid-column: auto; }
      h1 { font-size: 23px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>KPI Diagnostics</h1>
      <p>Pull HCP job and invoice signals for missing technician credit, split invoices, financing, and last-month discrepancies.</p>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="panel">
        <form id="diagForm" class="grid">
          <div class="span-2">
            <label for="token">Diagnostics Token</label>
            <input id="token" name="token" type="password" autocomplete="off" placeholder="Required on Railway">
          </div>
          <div>
            <label for="start">Start</label>
            <input id="start" name="start" type="date">
          </div>
          <div>
            <label for="end">End</label>
            <input id="end" name="end" type="date">
          </div>
          <div>
            <label for="invoice">Invoice #</label>
            <input id="invoice" name="invoice" placeholder="326">
          </div>
          <div>
            <label for="q">Search</label>
            <input id="q" name="q" placeholder="Patrick, customer, finance">
          </div>
          <div class="span-2">
            <label for="jobId">Job ID</label>
            <input id="jobId" name="job_id" placeholder="Optional exact HCP job id">
          </div>
          <div class="span-2">
            <label for="invoiceId">Invoice ID</label>
            <input id="invoiceId" name="invoice_id" placeholder="Optional exact HCP invoice uuid">
          </div>
          <div>
            <label for="limit">Limit</label>
            <select id="limit" name="limit">
              <option>40</option>
              <option selected>80</option>
              <option>120</option>
              <option>200</option>
            </select>
          </div>
          <div>
            <button type="submit">Run Diagnostics</button>
          </div>
          <div>
            <button type="button" class="secondary" id="lastMonth">Last Month</button>
          </div>
        </form>
        <div class="hint">The token is only sent as `X-Diagnostics-Token`. It is not the HCP API key.</div>
      </section>

      <div id="status" class="status"></div>
      <div id="results"></div>
    </div>
  </main>

  <script src="/diagnostics.js"></script>
</body>
</html>
