<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sunwave KPI Diagnostics</title>
  <style>
    /* Bento-Box Soft Minimalism — Sunwave palette
       Mirrors admin-kpi-bento.css. Class names kept intact so
       diagnostics.js renders without changes. */
    :root {
      color-scheme: light;
      --canvas: #F1F3F5;
      --card: #FAFBFC;
      --card-strong: #FFFFFF;
      --border: #DDE3EA;
      --ink: #373B4D;
      --ink-deep: #0B2447;
      --ink-mute: #7B8190;
      --ink-faint: #A8AEB7;
      --orange: #F38A3F;
      --orange-deep: #B05A22;
      --orange-wash: rgba(243, 138, 63, 0.12);
      --green: #4BAA78;
      --green-deep: #2E7A52;
      --green-wash: rgba(75, 170, 120, 0.14);
      --gold: #D39A2E;
      --gold-deep: #8C6716;
      --gold-wash: rgba(211, 154, 46, 0.16);
      --coral: #D65F4F;
      --coral-deep: #A33F30;
      --coral-wash: #FCEBE7;
      --shadow-card:
        0 1px 2px rgba(11, 36, 71, 0.025),
        0 24px 60px rgba(11, 36, 71, 0.05);
      --ease-out: cubic-bezier(.16, 1, .3, 1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background: var(--canvas);
      background-image:
        radial-gradient(ellipse 70% 50% at  0%   0%, rgba(243, 138, 63, 0.06)  0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 100% 28%, rgba(191, 224, 243, 0.34) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(75, 170, 120, 0.05)  0%, transparent 60%);
      background-attachment: fixed;
      min-height: 100vh;
      line-height: 1.45;
    }
    /* When embedded in the admin Diagnostics iframe — drop the
       canvas + outer chrome so the content flows as part of the
       parent page, not a window-in-a-window. */
    body.is-embedded {
      background: transparent;
      background-image: none;
      min-height: 0;
      overflow: hidden;
    }
    body.is-embedded header { display: none; }
    body.is-embedded main { padding-top: 0; }
    header {
      padding: 24px 20px 0;
      border-bottom: 0;
    }
    .wrap { max-width: 1180px; margin: 0 auto; }
    main { padding: 16px 20px 60px; }

    /* ── Hero card — title + description + eyebrow pills ───────── */
    .hero-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 36px 36px 34px;
      box-shadow: var(--shadow-card);
      margin: 0 0 16px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 96% 0%, rgba(243, 138, 63, 0.10), transparent 30%),
        radial-gradient(circle at 0% 100%, rgba(191, 224, 243, 0.20), transparent 36%);
    }
    .hero-eyebrow {
      position: relative;
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .hero-eyebrow .pill {
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--orange-wash);
      color: var(--orange-deep);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin: 0;
      min-height: 0;
    }
    h1 {
      position: relative;
      margin: 0 0 14px;
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 850;
      letter-spacing: -0.025em;
      color: var(--ink-deep);
      line-height: 1.0;
    }
    .hero-card p {
      position: relative;
      margin: 0;
      color: var(--ink-mute);
      line-height: 1.6;
      font-size: 15px;
      font-weight: 500;
      max-width: 720px;
    }

    /* ── Panel — the bento card ───────────────────────────────── */
    .panel {
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 26px;
      background: var(--card);
      margin-bottom: 18px;
      box-shadow: var(--shadow-card);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
      align-items: end;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      color: var(--ink-mute);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 7px;
    }
    input, select {
      width: 100%;
      min-height: 46px;
      border: 1px solid transparent;
      border-radius: 14px;
      font: inherit;
      font-weight: 500;
      padding: 11px 14px;
      background: var(--canvas);
      color: var(--ink);
      transition: border-color 180ms var(--ease-out), box-shadow 180ms var(--ease-out), background 180ms var(--ease-out);
    }
    input:hover, select:hover { background: #E8ECF0; }
    input:focus, select:focus {
      outline: none;
      border-color: var(--orange);
      background: var(--card-strong);
      box-shadow: 0 0 0 4px var(--orange-wash);
    }
    input::placeholder { color: var(--ink-faint); }
    button {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      font: inherit;
      padding: 12px 18px;
      background: var(--orange);
      color: #FFFFFF;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 180ms var(--ease-out), box-shadow 180ms var(--ease-out), filter 160ms;
      box-shadow: 0 12px 28px rgba(243, 138, 63, 0.26);
    }
    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 16px 36px rgba(243, 138, 63, 0.34);
    }
    button:active { transform: translateY(0) scale(0.98); }
    button.secondary {
      background: var(--card-strong);
      color: var(--ink);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    button.secondary:hover {
      filter: none;
      border-color: var(--orange);
      color: var(--orange);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(11, 36, 71, 0.06);
    }
    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-6 { grid-column: span 6; }
    .hint {
      font-size: 12.5px;
      margin-top: 14px;
      color: var(--ink-mute);
      font-weight: 500;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .actions button {
      width: auto;
      min-width: 190px;
    }

    /* ── Status banner ─────────────────────────────────────────── */
    .status {
      display: none;
      margin-bottom: 18px;
      padding: 16px 20px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--ink);
      font-size: 13.5px;
      font-weight: 500;
      box-shadow: var(--shadow-card);
    }
    .status.show { display: block; }

    /* ── Summary KPI tiles ─────────────────────────────────────── */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .metric {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px 22px;
      box-shadow: var(--shadow-card);
      transition: transform 200ms var(--ease-out), box-shadow 200ms var(--ease-out), border-color 200ms var(--ease-out);
    }
    .metric:hover {
      transform: translateY(-2px);
      border-color: rgba(243, 138, 63, 0.30);
      box-shadow: 0 2px 4px rgba(11, 36, 71, 0.05), 0 24px 56px rgba(11, 36, 71, 0.085);
    }
    .metric .label {
      color: var(--ink-mute);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }
    .metric b {
      display: block;
      font-size: 30px;
      font-weight: 850;
      margin-top: 12px;
      color: var(--ink-deep);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1.05;
    }

    /* ── Candidate result card ─────────────────────────────────── */
    .candidate {
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 14px;
      background: var(--card);
      box-shadow: var(--shadow-card);
      transition: transform 200ms var(--ease-out), box-shadow 200ms var(--ease-out), border-color 200ms var(--ease-out);
    }
    .candidate:hover {
      transform: translateY(-2px);
      border-color: rgba(243, 138, 63, 0.30);
      box-shadow: 0 2px 4px rgba(11, 36, 71, 0.05), 0 24px 56px rgba(11, 36, 71, 0.085);
    }
    .candidate-head {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: 16px;
      padding: 18px 22px;
      background: var(--canvas);
      border-bottom: 1px solid var(--border);
    }
    .candidate-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      padding: 18px 22px;
    }
    .label {
      color: var(--ink-mute);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    .value {
      margin-top: 5px;
      font-weight: 700;
      color: var(--ink-deep);
      overflow-wrap: anywhere;
      font-size: 14px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(123, 129, 144, 0.14);
      color: #5C6371;
      margin: 3px 4px 3px 0;
    }
    .pill.good { background: var(--green-wash); color: var(--green-deep); }
    .pill.warn { background: var(--gold-wash);  color: var(--gold-deep); }
    .pill.bad  { background: var(--coral-wash); color: var(--coral-deep); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
      margin-top: 10px;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      font-size: 10px;
      color: var(--ink-mute);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 800;
    }
    td { color: var(--ink); }

    details {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--canvas);
    }
    details summary {
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      outline: none;
      letter-spacing: 0.01em;
    }
    details[open] summary { color: var(--orange); }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.55;
      color: var(--ink);
      margin: 10px 0 0;
      font-family: ui-monospace, 'SF Mono', 'Menlo', monospace;
    }

    @media (max-width: 820px) {
      .grid, .summary, .candidate-head, .candidate-body { grid-template-columns: 1fr; }
      .span-2, .span-3, .span-6 { grid-column: auto; }
      .panel { border-radius: 20px; padding: 22px; }
      header { padding: 18px 14px 0; }
      .hero-card { padding: 26px 24px; border-radius: 22px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <section class="hero-card">
        <div class="hero-eyebrow">
          <span class="pill">Diagnostics</span>
          <span class="pill">Pipeline Signals</span>
        </div>
        <h1>KPI Diagnostics</h1>
        <p>Pull HCP job and invoice signals for missing technician credit, split invoices, financing, and last-month discrepancies.</p>
      </section>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="panel">
        <form id="diagForm" class="grid">
          <div class="span-2">
            <label for="password">Diagnostics Password</label>
            <input id="password" name="password" type="password" autocomplete="off" placeholder="Required on Railway">
          </div>
          <div>
            <label for="start">Start</label>
            <input id="start" name="start" type="date">
          </div>
          <div>
            <label for="end">End</label>
            <input id="end" name="end" type="date">
          </div>
          <div>
            <label for="invoice">Invoice #</label>
            <input id="invoice" name="invoice" placeholder="326">
          </div>
          <div>
            <label for="q">Search</label>
            <input id="q" name="q" placeholder="Patrick, customer, finance">
          </div>
          <div class="span-2">
            <label for="jobId">Job ID</label>
            <input id="jobId" name="job_id" placeholder="Optional exact HCP job id">
          </div>
          <div class="span-2">
            <label for="invoiceId">Invoice ID</label>
            <input id="invoiceId" name="invoice_id" placeholder="Optional exact HCP invoice uuid">
          </div>
          <div>
            <label for="limit">Limit</label>
            <select id="limit" name="limit">
              <option>40</option>
              <option selected>80</option>
              <option>120</option>
              <option>200</option>
            </select>
          </div>
          <div>
            <button type="submit">Run Diagnostics</button>
          </div>
          <div>
            <button type="button" class="secondary" id="lastMonth">Last Month</button>
          </div>
        </form>
        <div class="hint">Use the private diagnostics password. It is not the HCP API key.</div>
      </section>

      <div id="status" class="status"></div>
      <div class="actions">
        <button type="button" class="secondary" id="copyReport" disabled>Copy Plain Text Report</button>
      </div>
      <div id="results"></div>
    </div>
  </main>

  <script>
    /* When loaded inside the admin Diagnostics iframe (?embed=1),
       drop the page chrome and post our actual content height up
       so the parent can resize the iframe to fit — no inner
       scrollbar, no window-in-a-window. */
    (function () {
      try {
        const qs = new URLSearchParams(location.search || '');
        const isEmbed = (qs.get('embed') === '1' || qs.get('embed') === 'true');
        if (!isEmbed) return;
        document.body.classList.add('is-embedded');
        const postSize = () => {
          const h = Math.max(
            document.documentElement.scrollHeight,
            document.body.scrollHeight
          );
          try {
            window.parent.postMessage(
              { type: 'sunwave-diagnostics-height', height: h },
              '*'
            );
          } catch (e) {}
        };
        if ('ResizeObserver' in window) {
          new ResizeObserver(postSize).observe(document.body);
        }
        window.addEventListener('load', postSize);
        setTimeout(postSize, 50);
        window.addEventListener('wheel', (e) => {
          try {
            window.parent.postMessage(
              { type: 'sunwave-embed-wheel', deltaX: e.deltaX, deltaY: e.deltaY },
              '*'
            );
            e.preventDefault();
          } catch (err) {}
        }, { passive: false });
      } catch (e) {}
    })();
  </script>
  <script src="/diagnostics.js"></script>
</body>
</html>
