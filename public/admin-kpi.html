<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Admin — Sunwave</title>
  <link rel="icon" type="image/png" href="/Favicon.png">
  <style>
    /* ── Palette ────────────────────────────────────────────────── */
    :root {
      --bg: #FBF9F4;
      --card: #FDFCF8;
      --border: rgba(92, 84, 72, 0.14);
      --border-strong: rgba(92, 84, 72, 0.26);
      --ink: #2C2A28;
      --ink-soft: #5C5448;
      --ink-mute: #8A8680;
      --brand: #E88140;
      --brand-pale: #FDEFE0;
      --good: #2F7D49;
      --good-pale: #EBF4ED;
      --warn: #C9820A;
      --warn-pale: #FFF1E8;
      --bad: #C0392B;
      --bad-pale: #FBECE9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.45;
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .header h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
    .header .sub { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); font-weight: 600; }
    .nav-link { font-size: 12px; color: var(--brand); text-decoration: none; font-weight: 600; }
    .nav-link:hover { text-decoration: underline; }

    /* ── Auth gate ──────────────────────────────────────────────── */
    .gate { max-width: 380px; margin: 4rem auto; padding: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; }
    .gate label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
    .gate input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); margin-bottom: 12px; }
    .gate button { width: 100%; padding: 10px; background: var(--brand); color: white; border: 0; border-radius: 10px; font-weight: 700; cursor: pointer; }

    /* ── Tabs ───────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab { padding: 10px 18px; background: transparent; border: 0; border-bottom: 2px solid transparent; font-size: 13px; font-weight: 600; color: var(--ink-mute); cursor: pointer; transition: color 0.15s; }
    .tab.is-active { color: var(--brand); border-bottom-color: var(--brand); }
    .tab:hover { color: var(--ink); }
    .tab-count { display: inline-block; margin-left: 6px; padding: 1px 7px; font-size: 11px; background: var(--brand-pale); color: var(--brand); border-radius: 100px; font-weight: 700; }
    .panel { display: none; }
    .panel.is-active { display: block; }

    /* ── Period picker ──────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 14px;
    }
    .controls label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); }
    .controls select, .controls input[type="text"] {
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      font-family: inherit;
      color: var(--ink);
    }
    .controls button {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink-soft);
      border-radius: 8px;
      cursor: pointer;
    }
    .controls button:hover { border-color: var(--ink); color: var(--ink); }
    .controls .summary {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 12px;
      color: var(--ink-mute);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-radius: 100px;
    }
    .badge--good { background: var(--good-pale); color: var(--good); border: 1px solid #C9DFCD; }
    .badge--warn { background: var(--warn-pale); color: var(--warn); border: 1px solid #F1D48E; }

    /* ── Job rows (inline-edit) ────────────────────────────────── */
    .jobs-list {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .job {
      border-bottom: 1px solid var(--border);
    }
    .job:last-child { border-bottom: 0; }
    .job-summary {
      display: grid;
      grid-template-columns: 110px 1fr 95px 110px 32px;
      gap: 12px;
      padding: 12px 16px;
      align-items: center;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .job-summary:hover { background: rgba(232, 129, 64, 0.05); }
    .job.is-open .job-summary { background: rgba(232, 129, 64, 0.08); }
    .job-status {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      text-align: center;
      white-space: nowrap;
    }
    .job-status--reconciled   { background: var(--good-pale); color: var(--good); }
    .job-status--excluded     { background: #ECECE6; color: var(--ink-mute); }
    .job-status--unattributed { background: var(--warn-pale); color: var(--warn); }
    .job-status--credited     { background: var(--brand-pale); color: var(--brand); }
    .job-main { min-width: 0; }
    .job-line1 { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; font-size: 14px; }
    .job-line1 .inv { font-weight: 700; font-variant-numeric: tabular-nums; }
    .job-line1 .cust { color: var(--ink-soft); font-weight: 600; }
    .job-line2 { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }
    .job-date { font-size: 11px; color: var(--ink-mute); letter-spacing: 0.04em; text-align: right; }
    .job-amount { font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }
    .job-amount-sub { font-size: 11px; color: var(--ink-mute); font-weight: 500; }
    .job-chevron {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-mute);
      transition: transform 0.2s;
    }
    .job.is-open .job-chevron { transform: rotate(180deg); color: var(--brand); }

    /* ── Inline edit panel (expands under each row) ────────────── */
    .job-edit {
      display: none;
      padding: 16px 20px 20px;
      background: var(--bg);
      border-top: 1px dashed var(--border-strong);
    }
    .job.is-open .job-edit { display: block; }
    .edit-section { margin-bottom: 16px; }
    .edit-section:last-child { margin-bottom: 0; }
    .edit-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }
    .hcp-context {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 18px;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .hcp-context dt {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
      margin: 0 0 2px;
    }
    .hcp-context dd { margin: 0; }
    @media (max-width: 600px) { .hcp-context { grid-template-columns: 1fr; } }

    /* Attribution rows */
    .assign-table { display: flex; flex-direction: column; gap: 6px; }
    .assign-row {
      display: grid;
      grid-template-columns: 1fr 130px 90px 32px;
      gap: 8px;
      align-items: center;
    }
    .assign-row input, .assign-row select {
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      font-family: inherit;
      width: 100%;
    }
    .assign-row input:focus, .assign-row select:focus {
      outline: none;
      border-color: var(--brand);
      background: white;
    }
    .assign-row .remove {
      width: 32px;
      height: 32px;
      padding: 0;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 8px;
      cursor: pointer;
      color: var(--bad);
      font-size: 16px;
      line-height: 1;
    }
    .assign-row .remove:hover { border-color: var(--bad); }
    @media (max-width: 600px) {
      .assign-row { grid-template-columns: 1fr 110px 70px 32px; }
    }
    .add-tech-btn {
      margin-top: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      background: transparent;
      color: var(--ink-soft);
      border: 1px dashed var(--border-strong);
      border-radius: 8px;
      cursor: pointer;
    }
    .add-tech-btn:hover { border-color: var(--brand); color: var(--brand); }
    .pct-status { font-size: 11px; color: var(--ink-mute); margin-top: 8px; letter-spacing: 0.04em; }
    .pct-status.is-bad { color: var(--bad); font-weight: 700; }
    .pct-status.is-good { color: var(--good); font-weight: 700; }

    /* Money + date fields */
    .money-date {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 600px) { .money-date { grid-template-columns: 1fr; } }
    .field input, .field textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus {
      outline: none;
      border-color: var(--brand);
      background: white;
    }
    .field textarea { min-height: 60px; resize: vertical; }

    /* Toggle rows */
    .toggle {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
    }
    .toggle input[type="checkbox"] { margin-top: 2px; cursor: pointer; }
    .toggle label { cursor: pointer; flex: 1; line-height: 1.4; }
    .toggle label small { display: block; color: var(--ink-mute); font-size: 12px; margin-top: 2px; }
    .toggle--paid { background: var(--good-pale); border: 1px solid #C9DFCD; }
    .toggle--exclude { background: var(--bad-pale); border: 1px solid #E0B0A8; }
    .toggle--lock { background: var(--warn-pale); border: 1px solid #F1D48E; }

    /* Action buttons */
    .edit-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--ink-soft);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:hover { border-color: var(--ink); color: var(--ink); }
    .btn--primary {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
      font-weight: 700;
      padding: 10px 22px;
      box-shadow: 0 1px 3px rgba(232, 129, 64, 0.25);
    }
    .btn--primary:hover { filter: brightness(1.05); color: white; border-color: var(--brand); }
    .btn--danger { color: var(--bad); }
    .btn--danger:hover { border-color: var(--bad); color: var(--bad); }
    .status-msg { font-size: 12px; margin-right: auto; color: var(--ink-mute); }
    .status-msg.is-ok  { color: var(--good); font-weight: 600; }
    .status-msg.is-err { color: var(--bad); font-weight: 600; }

    .empty { padding: 32px; text-align: center; color: var(--ink-mute); font-size: 13px; }

    /* "Why this is unattributed" callout in the edit panel */
    .why-card {
      padding: 14px 16px;
      background: var(--warn-pale);
      border: 1px solid #F1D48E;
      border-left: 4px solid var(--warn);
      border-radius: 10px;
    }
    .why-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--warn);
      margin-bottom: 6px;
    }
    .why-detail {
      font-size: 13px;
      color: var(--ink);
      line-height: 1.5;
    }

    /* Open-issues + locked-records simple lists */
    .item-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 10px;
    }

    /* Embedded admin tools */
    .embed-frame { width: 100%; height: 82vh; min-height: 540px; border: 1px solid var(--border); border-radius: 12px; background: var(--card); }
  </style>
</head>
<body>

<div class="page">
  <!-- Auth gate -->
  <div id="gate" class="gate">
    <label>Admin password</label>
    <input type="password" id="pwInput" autocomplete="current-password" placeholder="diagnostics password">
    <button id="gateBtn">Open</button>
  </div>

  <!-- Main app (hidden until auth succeeds) -->
  <div id="app" style="display:none">
    <div class="header">
      <div>
        <h1>KPI Admin</h1>
        <div class="sub">Reconcile attribution &middot; Lock jobs</div>
      </div>
      <div><a class="nav-link" href="/">&larr; Dashboard</a></div>
    </div>

    <div class="tabs">
      <button class="tab" data-panel="reconcile">Reconcile a job</button>
      <button class="tab" data-panel="issues">Open issues <span class="tab-count" id="issueCount">0</span></button>
      <button class="tab" data-panel="locked">Locked records <span class="tab-count" id="lockedCount">0</span></button>
      <button class="tab" data-panel="coverage">Coverage check</button>
      <button class="tab" data-panel="diagnostics">Diagnostics</button>
    </div>

    <!-- ─────────────────── RECONCILE TAB ─────────────────── -->
    <div id="panel-reconcile" class="panel is-active">
      <div class="controls">
        <label for="periodSel">Period</label>
        <select id="periodSel">
          <option value="day">Today</option>
          <option value="yesterday">Yesterday</option>
          <option value="wtd">Week to Date</option>
          <option value="l7d">Last 7 Days</option>
          <option value="l14d">Last 14 Days</option>
          <option value="mtd" selected>Month to Date</option>
          <option value="lm">Last Month</option>
          <option value="l30d">Last 30 Days</option>
          <option value="l90d">Last 90 Days</option>
          <option value="ytd">Year to Date</option>
        </select>
        <button id="reloadBtn">Reload</button>
        <div class="summary">
          <span id="summaryAction">— need action</span>
          <span class="badge" id="summaryBadge">— of —</span>
        </div>
      </div>

      <div class="controls" style="padding-top:10px;padding-bottom:10px">
        <label for="jobLookup">Search loaded jobs</label>
        <input type="text" id="jobLookup" placeholder="Customer, invoice, $, tech, date, status…" style="flex:1 1 240px">
        <span id="filterCount" style="font-size:12px;color:var(--ink-mute);min-width:80px"></span>
        <button id="lookupBtn" title="Fetch a job that's not in the current period (job_xxx or invoice #)">Open exact</button>
      </div>

      <div id="jobsList" class="jobs-list">
        <div class="empty">Pick a period and hit Reload.</div>
      </div>
    </div>

    <!-- ─────────────────── ISSUES TAB ─────────────────── -->
    <div id="panel-issues" class="panel">
      <div id="issuesList"></div>
    </div>

    <!-- ─────────────────── LOCKED TAB ─────────────────── -->
    <div id="panel-locked" class="panel">
      <div class="controls">
        <label for="monthFilter">Filter by month</label>
        <input type="month" id="monthFilter">
        <button id="loadLockedBtn">Load</button>
      </div>
      <div id="lockedList"></div>
    </div>

    <!-- ─────────────────── COVERAGE TAB ─────────────────── -->
    <div id="panel-coverage" class="panel">
      <iframe class="embed-frame" id="coverageFrame" title="Coverage check"></iframe>
    </div>

    <!-- ─────────────────── DIAGNOSTICS TAB ─────────────────── -->
    <div id="panel-diagnostics" class="panel">
      <iframe class="embed-frame" id="diagnosticsFrame" title="Diagnostics"></iframe>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════
   KPI Admin — inline-edit reconciliation page

   Architecture goals:
     • Every editable field is a real <input>/<select> element,
       directly in the row's expand panel. No modal, no "open
       editor" anywhere. Save button is right there.
     • Click any row → expands inline. Click again → collapses.
     • All click handling via event delegation on `document` so
       it cannot fail to attach.
     • Server data + UI state kept in one place per job (window.JOBS).
   ════════════════════════════════════════════════════════════════════ */

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const fmt = (n) => '$' + Math.round(Number(n) || 0).toLocaleString();
const ymd = (iso) => iso ? new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';
const isoDate = (iso) => iso ? String(iso).slice(0, 10) : '';

let PASSWORD = sessionStorage.getItem('kpi-admin-pw') || '';
let CURRENT_RANGE = localStorage.getItem('kpi-admin-range') || 'mtd';
// In-memory job state. Map of jobId → { server data + working edits }.
// The Save button reads from this map.
window.JOBS = {};
// Cached HCP employee list (loaded once after auth, used to populate
// the "Add tech" datalist in every edit panel).
window.EMPLOYEES = [];

/* ════════════════════════════════════════════════════════════════════
   Sunwave attribution rules (auto-applied on add/remove/role-change):

     • Sold pool = 1/3 of job total  → split evenly across sellers
     • Did pool  = 2/3 of job total  → split evenly across doers
     • A tech with role "Sold & Did" sits in BOTH pools, so they get
       a slice of each (matches the user's rule: "if a tech sold it
       and did it with someone else, they get 2/3 and the helper
       gets 1/3").

   Edge cases:
     • No seller? Doers split 100%.
     • No doer?   Sellers split 100%.
     • Empty list? Nothing to compute.

   A manual percentage edit in the input field overrides the auto
   value for that tech until the next add/remove/role-change event,
   which re-applies the formula across all rows.
   ════════════════════════════════════════════════════════════════════ */
function recomputePercents(assignments) {
  if (!assignments || assignments.length === 0) return;
  const sellers = assignments.filter(a => a.role === 'Sold' || a.role === 'Sold & Did');
  const doers   = assignments.filter(a => a.role === 'Did'  || a.role === 'Sold & Did');
  const hasS = sellers.length > 0, hasD = doers.length > 0;
  // Pool sizes — fall back to 100% on whichever side exists when the
  // other is empty, so a job with only doers (or only sellers) still
  // sums to 100.
  const sellerPool = hasS && hasD ? 100 / 3 : (hasS ? 100 : 0);
  const doerPool   = hasS && hasD ? 200 / 3 : (hasD ? 100 : 0);
  const sellerShare = hasS ? sellerPool / sellers.length : 0;
  const doerShare   = hasD ? doerPool   / doers.length   : 0;
  assignments.forEach(a => {
    let pct = 0;
    if (a.role === 'Sold' || a.role === 'Sold & Did') pct += sellerShare;
    if (a.role === 'Did'  || a.role === 'Sold & Did') pct += doerShare;
    // 1 decimal of precision so the UI is readable.
    a.creditPct = Math.round(pct * 10) / 10;
  });
  // Reconcile rounding so sum is exactly 100 — adjust the last entry.
  const sum = assignments.reduce((s, a) => s + a.creditPct, 0);
  if (sum > 0 && assignments.length > 0) {
    const drift = 100 - sum;
    if (Math.abs(drift) >= 0.05) {
      assignments[assignments.length - 1].creditPct =
        Math.round((assignments[assignments.length - 1].creditPct + drift) * 10) / 10;
    }
  }
}

// ── Auth gate ──────────────────────────────────────────────────────
if (PASSWORD) initApp();
$('gateBtn').addEventListener('click', () => {
  PASSWORD = $('pwInput').value.trim();
  if (!PASSWORD) return;
  sessionStorage.setItem('kpi-admin-pw', PASSWORD);
  initApp();
});
$('pwInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('gateBtn').click(); });

async function initApp() {
  try {
    await api('/api/kpi/admin/issues');
    $('gate').style.display = 'none';
    $('app').style.display = '';
    document.querySelector('.tab[data-panel="reconcile"]').classList.add('is-active');
    $('panel-reconcile').classList.add('is-active');
    $('periodSel').value = CURRENT_RANGE;
    // Kick off all three in parallel — none blocks the others.
    loadEmployees();
    loadJobs();
    loadIssues();
  } catch (err) {
    $('gate').style.display = '';
    $('app').style.display = 'none';
    alert('Auth failed: ' + err.message);
  }
}

// Pull the active HCP employee roster once and stash it on window so
// every editor panel can populate its "Add tech" dropdown without an
// extra round-trip. Failures here are non-fatal — the input just
// falls back to free-text typing.
async function loadEmployees() {
  try {
    const data = await api('/api/kpi/admin/employees');
    window.EMPLOYEES = (data.employees || []).slice();
    // Update any datalists that may already be in the DOM
    document.querySelectorAll('datalist#techsList').forEach(dl => {
      dl.innerHTML = window.EMPLOYEES.map(e => '<option value="' + esc(e.name) + '">').join('');
    });
  } catch (err) {
    console.warn('Could not load employees:', err.message);
  }
}

async function api(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers || {}, { 'X-Diagnostics-Password': PASSWORD });
  if (opts.body && typeof opts.body !== 'string') {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) {
    if (r.status === 401) {
      sessionStorage.removeItem('kpi-admin-pw');
      $('gate').style.display = '';
      $('app').style.display = 'none';
    }
    throw new Error(data.error || ('HTTP ' + r.status));
  }
  return data;
}

document.querySelectorAll('.tab').forEach(t => {

function loadEmbed(frameId, src) {
  const f = $(frameId);

async function loadJobs() {
  $('jobsList').innerHTML = '<div class="empty">Loading…</div>';
  $('summaryAction').textContent = '';
  $('summaryBadge').textContent = '…';
  try {
    const data = await api('/api/kpi/admin/period-jobs?range=' + encodeURIComponent(CURRENT_RANGE));
    const jobs = data.jobs || [];
    const s = data.summary || {};

    $('summaryAction').textContent = (s.unattributed || 0) + ' need action';
    if (s.fullyReconciled) {
      $('summaryBadge').className = 'badge badge--good';
      $('summaryBadge').textContent = '✓ Fully reconciled';
    } else {
      $('summaryBadge').className = 'badge badge--warn';
      $('summaryBadge').textContent = (s.reconciled || 0) + ' of ' + (s.total || 0) + ' reconciled';
    }

    if (jobs.length === 0) {
      $('jobsList').innerHTML = '<div class="empty">No jobs in this period.</div>';
      return;
    }
    // Stash the server data so the Save button can read it
    window.JOBS = {};
    jobs.forEach(j => {
      const key = j.jobId || j.invoice || ('row_' + Math.random().toString(36).slice(2, 8));
      window.JOBS[key] = j;
      j._localKey = key;
      j._haystack = buildHaystack(j);
    });
    $('jobsList').innerHTML = jobs.map(renderJob).join('');
    applyFilter(); // Re-apply if there's an active query from a previous load
  } catch (err) {
    $('jobsList').innerHTML = '<div class="empty">Error: ' + esc(err.message) + '</div>';
  }
}

// ── Job row rendering (collapsed + expanded together) ──────────────

// Render the expanded editor inside a job row. We do this lazily on
// first expand so a list of 100 jobs doesn't render 100 forms up front.
async function renderEditPanel(key) {
  const j = window.JOBS[key];
  const panel = document.querySelector('.job-edit[data-edit-for="' + cssEscape(key) + '"]');
  if (!j || !panel) return;
  panel.innerHTML = '<div class="empty" style="padding:8px">Loading HCP details…</div>';

  // Fetch fresh HCP details + active reconciliation for this specific job.
  // If we don't have a jobId, fall back to invoice lookup.
  let serverData = null;
  try {
    if (j.jobId) {
      serverData = await api('/api/kpi/admin/job/' + encodeURIComponent(j.jobId));
    } else if (j.invoice) {
      const lookup = await api('/api/kpi/admin/job-by-invoice?invoice=' + encodeURIComponent(j.invoice));
      if (lookup && lookup.jobId) {
        j.jobId = lookup.jobId;
        serverData = await api('/api/kpi/admin/job/' + encodeURIComponent(lookup.jobId));
      }
    }
  } catch (err) {
    panel.innerHTML = '<div class="empty" style="padding:8px;color:var(--bad)">Could not load HCP details: ' + esc(err.message) + '</div>';
    return;
  }
  if (!serverData || !serverData.job) {
    panel.innerHTML = '<div class="empty" style="padding:8px">No HCP record available for this job. Paste the job_xxx ID from HCP into the lookup field above to edit.</div>';
    return;
  }

  const job = serverData.job;
  const recon = serverData.reconciliation;

  // Working state for this row's editor (lives in window.JOBS[key])
  // Default the FIRST HCP-assigned tech to "Sold & Did" — most Sunwave
  // jobs are sold and worked by the same person, so this lets the
  // admin add a helper tech in one click (the new tech defaults to
  // "Did" and the split formula auto-applies: 66.66% / 33.33%).
  j.edit = {
    assignments: (recon && recon.assignments && recon.assignments.length)
      ? recon.assignments.slice()
      : (job.assignedEmployees.length
          ? job.assignedEmployees.map((e, i) => ({ employeeName: e.name, role: i === 0 ? 'Sold & Did' : 'Did', creditPct: 0 }))
          : []),
    totalAmount: recon && recon.totalAmount != null ? recon.totalAmount : job.totalAmount,
    kpiDate: isoDate(recon && recon.kpiDate ? recon.kpiDate : (job.completedAt || job.scheduledStart)),
    notes: (recon && recon.notes) || '',
    locked: recon ? recon.locked !== false : true,
    markedPaid: !!(recon && recon.markedPaid),
    excluded:   !!(recon && recon.excluded),
    job: job,
    isReconciled: !!recon
  };
  // Apply the Sunwave split formula to the seeded assignments so the
  // % values match the roles before the first render.
  if (!(recon && recon.assignments && recon.assignments.length)) {
    recomputePercents(j.edit.assignments);
  }

  // Map the server's reason codes to actionable explanations for the
  // admin. When a job lands in the unattributed bucket, this tells
  // the admin WHY the auto-pipeline couldn't credit it and what to
  // do about it right here in the editor.
  const REASON_LABELS = {
    no_assigned_employees: {
      title: 'No tech assigned in HCP',
      detail: 'The job has no assigned_employees set in Housecall Pro, so the auto-pipeline can\'t guess who to credit. Pick the right tech(s) below in the Attribution section and hit Save — they\'ll show up on the leaderboard on the next refresh.'
    },
    completed_in_different_period: {
      title: 'Work was done in a different period',
      detail: 'The customer paid in this period, but the job\'s service date (see KPI date below) is outside it. The job is already credited on the period where the work actually happened. You usually don\'t need to do anything here — but you can adjust the KPI date below if HCP has the wrong service date.'
    },
    servicetitan_artifact: {
      title: 'ServiceTitan migration record',
      detail: 'This job was imported from ServiceTitan before the HCP migration. Excluded by design from post-cutover KPI periods. If this is real post-cutover work mistakenly tagged as ST, remove the ServiceTitan tag/lead-source in HCP.'
    },
    job_details_unavailable: {
      title: 'HCP couldn\'t return job details',
      detail: 'The /jobs/{id} fetch from HCP failed (likely archived, deleted, or a transient error). The invoice shows the work happened, but we can\'t read the underlying job. Manually fill out the attribution below if it should count.'
    },
    standalone_invoice_no_job: {
      title: 'Invoice has no linked service job',
      detail: 'An invoice was paid, but there\'s no service job tied to it in HCP. Standalone invoices can\'t be auto-attributed. If a tech actually did the work, add their name(s) below and save.'
    },
    pipeline_unknown: {
      title: 'Pipeline glitch',
      detail: 'The auto-pipeline didn\'t credit this for an unexpected reason. This is rare — likely a bug. Reconcile manually here, and let Levi know which job # this is so the underlying logic can be fixed.'
    }
  };
  const reasonInfo = j.status === 'unattributed' && j.reason ? REASON_LABELS[j.reason] : null;
  const reasonBlock = reasonInfo ? `
    <div class="edit-section unattributed-why">
      <span class="edit-label" style="color:var(--warn)">Why this is unattributed</span>
      <div class="why-card">
        <div class="why-title">${esc(reasonInfo.title)}</div>
        <div class="why-detail">${esc(reasonInfo.detail)}</div>
      </div>
    </div>
  ` : '';

  panel.innerHTML = `
    ${reasonBlock}
    <div class="edit-section">
      <span class="edit-label">HCP Context (read-only)</span>
      <dl class="hcp-context">
        <div>
          <dt>Job ID</dt><dd style="font-family:ui-monospace,monospace;font-size:11px">${esc(job.id)}</dd>
          <dt>Description</dt><dd>${esc(job.description || '—')}</dd>
          <dt>HCP status</dt><dd>${esc(job.workStatus || '—')}</dd>
          <dt>HCP assigned</dt><dd>${job.assignedEmployees.length ? job.assignedEmployees.map(e => esc(e.name)).join(', ') : '<em>none</em>'}</dd>
        </div>
        <div>
          <dt>HCP total</dt><dd>${fmt(job.totalAmount)}</dd>
          <dt>Outstanding (HCP)</dt><dd>${fmt(job.outstandingBalance)}</dd>
          <dt>Completed</dt><dd>${isoDate(job.completedAt) || '—'}</dd>
          <dt>Scheduled</dt><dd>${isoDate(job.scheduledStart) || '—'}</dd>
        </div>
      </dl>
    </div>

    <div class="edit-section">
      <span class="edit-label">Attribution (who gets credit, and how much)</span>
      <p style="font-size:12px;color:var(--ink-mute);margin:0 0 10px;line-height:1.5">
        Percentages auto-apply Sunwave's split: <strong>1/3 for selling</strong>, <strong>2/3 split among doers</strong>.
        Pick "Sold &amp; Did" if the same tech sold and worked it. Manually edit the % to override.
      </p>
      <div class="assign-table" data-assignments-for="${esc(key)}"></div>
      <button type="button" class="add-tech-btn" data-action="add-tech" data-key="${esc(key)}">+ Add tech</button>
      <datalist id="techsList-${esc(key)}">
        ${(window.EMPLOYEES || []).map(e => '<option value="' + esc(e.name) + '">').join('')}
      </datalist>
      <div class="pct-status" data-pct-for="${esc(key)}"></div>
    </div>

    <div class="edit-section">
      <span class="edit-label">Money &amp; timing</span>
      <div class="money-date">
        <div class="field">
          <label class="edit-label" style="margin-bottom:4px">Effective total ($)</label>
          <input type="number" step="0.01" data-field="totalAmount" data-key="${esc(key)}" value="${Number(j.edit.totalAmount).toFixed(2)}">
        </div>
        <div class="field">
          <label class="edit-label" style="margin-bottom:4px">KPI date (period this counts toward)</label>
          <input type="date" data-field="kpiDate" data-key="${esc(key)}" value="${esc(j.edit.kpiDate)}">
        </div>
      </div>
    </div>

    <div class="edit-section">
      <span class="edit-label">Notes (admin-only)</span>
      <div class="field">
        <textarea data-field="notes" data-key="${esc(key)}" placeholder="e.g. Patrick + Trevor split this water heater 60/40 because Patrick led the install.">${esc(j.edit.notes)}</textarea>
      </div>
    </div>

    <div class="edit-section">
      <div class="toggle toggle--paid">
        <input type="checkbox" id="paidChk-${esc(key)}" data-field="markedPaid" data-key="${esc(key)}" ${j.edit.markedPaid ? 'checked' : ''}>
        <label for="paidChk-${esc(key)}">
          <strong>Mark as paid</strong>
          <small>Forces the outstanding balance to $0 for this job. Use when the customer paid in cash or by another channel HCP hasn't synced yet.</small>
        </label>
      </div>
      <div class="toggle toggle--exclude" style="margin-top:6px">
        <input type="checkbox" id="excludeChk-${esc(key)}" data-field="excluded" data-key="${esc(key)}" ${j.edit.excluded ? 'checked' : ''}>
        <label for="excludeChk-${esc(key)}">
          <strong>Exclude from dashboard entirely</strong>
          <small>The job won't appear on the leaderboard or in the unattributed list. For duplicates, voided invoices, or work that shouldn't count.</small>
        </label>
      </div>
      <div class="toggle toggle--lock" style="margin-top:6px">
        <input type="checkbox" id="lockChk-${esc(key)}" data-field="locked" data-key="${esc(key)}" ${j.edit.locked ? 'checked' : ''}>
        <label for="lockChk-${esc(key)}">
          <strong>Lock this reconciliation</strong>
          <small>The auto-pipeline can never overwrite locked records on future refreshes.</small>
        </label>
      </div>
    </div>

    <div class="edit-actions">
      <span class="status-msg" data-status-for="${esc(key)}"></span>
      ${j.edit.isReconciled ? '<button type="button" class="btn btn--danger" data-action="unreconcile" data-key="' + esc(key) + '">Remove reconciliation</button>' : ''}
      <button type="button" class="btn" data-action="close" data-key="${esc(key)}">Close</button>

function renderAssignments(key) {
  const j = window.JOBS[key];
  if (!j || !j.edit) return;
  const wrap = document.querySelector('.assign-table[data-assignments-for="' + cssEscape(key) + '"]');
  if (!wrap) return;
  wrap.innerHTML = j.edit.assignments.map((a, i) => `
    <div class="assign-row">
      <input type="text" list="techsList-${esc(key)}" placeholder="Type or pick a tech…" value="${esc(a.employeeName || '')}"
        data-action="assign-name" data-key="${esc(key)}" data-i="${i}" autocomplete="off">
      <select data-action="assign-role" data-key="${esc(key)}" data-i="${i}">
        <option value="Did" ${a.role === 'Did' ? 'selected' : ''}>Did</option>
        <option value="Sold" ${a.role === 'Sold' ? 'selected' : ''}>Sold</option>
        <option value="Sold & Did" ${a.role === 'Sold & Did' ? 'selected' : ''}>Sold &amp; Did</option>
      </select>
      <input type="number" step="0.1" min="0" max="100" placeholder="%" value="${Number(a.creditPct || 0).toFixed(1)}"
        data-action="assign-pct" data-key="${esc(key)}" data-i="${i}">
      <button type="button" class="remove" data-action="remove-tech" data-key="${esc(key)}" data-i="${i}" title="Remove">×</button>
    </div>
  `).join('');
  refreshPctStatus(key);
}

function refreshPctStatus(key) {
  const j = window.JOBS[key];
  const el = document.querySelector('.pct-status[data-pct-for="' + cssEscape(key) + '"]');
  if (!j || !j.edit || !el) return;
  const sum = j.edit.assignments.reduce((s, a) => s + (Number(a.creditPct) || 0), 0);
  if (Math.abs(sum - 100) < 0.5) {
    el.textContent = '✓ Total: 100%';
    el.className = 'pct-status is-good';
  } else {
    el.textContent = '⚠ Total: ' + sum.toFixed(1) + '% — must sum to 100 (unless excluding the job)';
    el.className = 'pct-status is-bad';
  }
}

// CSS.escape isn't universal — small shim for older browsers
function cssEscape(s) {
  return String(s).replace(/[^a-zA-Z0-9_-]/g, c => '\\' + c);
}

// ── Single delegated event handler for the entire jobs list ─────────
document.addEventListener('click', async (e) => {
  const t = e.target;
  const actionEl = t.closest('[data-action]');
  if (!actionEl) return;
  const action = actionEl.dataset.action;
  const key = actionEl.dataset.key;

  if (action === 'toggle') {
    const job = actionEl.closest('.job');
    if (!job) return;
    const wasOpen = job.classList.contains('is-open');
    // Close any other open rows (one expanded at a time keeps things tidy)
    document.querySelectorAll('.job.is-open').forEach(j => { if (j !== job) j.classList.remove('is-open'); });
    if (wasOpen) {
      job.classList.remove('is-open');
    } else {
      job.classList.add('is-open');
      const k = job.dataset.key;
      // Lazy-load the editor on first expand
      const panel = job.querySelector('.job-edit');
      if (panel && !panel.dataset.loaded) {
        panel.dataset.loaded = '1';
        await renderEditPanel(k);
      }
    }
    return;
  }

  if (action === 'add-tech') {
    const j = window.JOBS[key];
    if (!j || !j.edit) return;
    j.edit.assignments.push({ employeeName: '', role: 'Did', creditPct: 0 });
    // Auto-recompute every tech's share using the 1/3 - 2/3 rule.
    recomputePercents(j.edit.assignments);
    renderAssignments(key);
    return;
  }
  if (action === 'remove-tech') {
    const j = window.JOBS[key];
    if (!j || !j.edit) return;
    const i = Number(actionEl.dataset.i);
    j.edit.assignments.splice(i, 1);
    recomputePercents(j.edit.assignments);
    renderAssignments(key);
    return;
  }
  if (action === 'close') {
    const job = actionEl.closest('.job');
    if (job) job.classList.remove('is-open');
    return;
  }
  if (action === 'unreconcile') {
    if (!confirm('Remove this reconciliation? The job goes back to auto-attribution.')) return;
    try {
      const j = window.JOBS[key];
      const jobId = j && j.jobId;
      if (!jobId) throw new Error('No jobId on this row');
      await api('/api/kpi/admin/reconcile/' + encodeURIComponent(jobId), { method: 'DELETE' });
      setRowStatus(key, 'Reconciliation removed.', 'ok');
      setTimeout(loadJobs, 600);
    } catch (err) {
      setRowStatus(key, 'Error: ' + err.message, 'err');
    }
    return;
  }
  if (action === 'save') {
    await saveJob(key);
    return;
  }
});

// Inputs in the edit panel — wire up via delegation too
document.addEventListener('input', (e) => {
  const t = e.target;
  const action = t.dataset.action;
  const key = t.dataset.key;
  if (!action || !key) return;
  const j = window.JOBS[key];
  if (!j || !j.edit) return;
  if (action === 'assign-name') {
    j.edit.assignments[Number(t.dataset.i)].employeeName = t.value;
  } else if (action === 'assign-pct') {
    j.edit.assignments[Number(t.dataset.i)].creditPct = Number(t.value) || 0;
    refreshPctStatus(key);
  }
});
document.addEventListener('change', (e) => {
  const t = e.target;
  const action = t.dataset.action;
  const field = t.dataset.field;
  const key = t.dataset.key;
  if (!key) return;
  const j = window.JOBS[key];
  if (!j || !j.edit) return;
  if (action === 'assign-role') {
    j.edit.assignments[Number(t.dataset.i)].role = t.value;
    // Role changes the seller/doer split — recompute every tech's
    // share and re-render so the percentage inputs reflect the new
    // attribution.
    recomputePercents(j.edit.assignments);
    renderAssignments(key);
  } else if (field === 'totalAmount') {
    j.edit.totalAmount = parseFloat(t.value) || 0;
  } else if (field === 'kpiDate') {
    j.edit.kpiDate = t.value;
  } else if (field === 'notes') {
    j.edit.notes = t.value;
  } else if (field === 'markedPaid') {
    j.edit.markedPaid = t.checked;
  } else if (field === 'excluded') {
    j.edit.excluded = t.checked;
  } else if (field === 'locked') {
    j.edit.locked = t.checked;
  }
});
// Catch textarea/input changes that don't fire 'change' until blur
document.addEventListener('blur', (e) => {
  const t = e.target;
  const field = t.dataset.field;
  const key = t.dataset.key;
  if (!field || !key) return;
  const j = window.JOBS[key];
  if (!j || !j.edit) return;
  if (field === 'notes') j.edit.notes = t.value;
  if (field === 'totalAmount') j.edit.totalAmount = parseFloat(t.value) || 0;
  if (field === 'kpiDate') j.edit.kpiDate = t.value;
}, true);

async function saveJob(key) {
  const j = window.JOBS[key];
  if (!j || !j.edit) { alert('No job data — try reloading the list.'); return; }
  const jobId = j.jobId;
  if (!jobId) { setRowStatus(key, 'No jobId to save against.', 'err'); return; }

  // Validate when not excluding
  const cleanAssignments = j.edit.assignments
    .map(a => ({
      employeeName: String(a.employeeName || '').trim(),
      role: ['Sold', 'Did', 'Sold & Did'].includes(a.role) ? a.role : 'Did',
      creditPct: Math.max(0, Math.min(100, Number(a.creditPct) || 0))
    }))
    .filter(a => a.employeeName);
  if (!j.edit.excluded) {
    if (cleanAssignments.length === 0) {
      setRowStatus(key, 'Add at least one tech or check Exclude.', 'err');
      return;
    }
    const sum = cleanAssignments.reduce((s, a) => s + a.creditPct, 0);
    if (Math.abs(sum - 100) > 0.5) {
      setRowStatus(key, 'Percentages must sum to 100 (currently ' + sum.toFixed(1) + '%).', 'err');
      return;
    }
  }

  setRowStatus(key, 'Saving…', '');
  try {
    await api('/api/kpi/admin/reconcile', {
      method: 'POST',
      body: {
        jobId,
        assignments: cleanAssignments,
        totalAmount: j.edit.totalAmount,
        kpiDate: j.edit.kpiDate,
        notes: j.edit.notes,
        locked: j.edit.locked,
        markedPaid: j.edit.markedPaid,
        excluded: j.edit.excluded,
        reconciledBy: 'admin'
      }
    });
    setRowStatus(key, 'Saved. The dashboard will pick this up on next refresh.', 'ok');
    setTimeout(loadJobs, 800);
  } catch (err) {
    setRowStatus(key, 'Error: ' + err.message, 'err');
  }
}
function setRowStatus(key, msg, tone) {
  const el = document.querySelector('.status-msg[data-status-for="' + cssEscape(key) + '"]');
  if (!el) return;
  el.textContent = msg;
  el.className = 'status-msg' + (tone === 'ok' ? ' is-ok' : tone === 'err' ? ' is-err' : '');
}

// ── Search / lookup ──────────────────────────────────────────────────
// The search field has two behaviors:
//   1. As-you-type LIVE FILTER across every job loaded in the current
//      period — matches against customer, invoice, total, kpiDate,
//      assigned techs, reconciled-attribution techs, description,
//      status, and jobId. Multi-word queries AND together.
//   2. "Open exact" button: if the query is a job_xxx or a pure
//      invoice number AND nothing matched the live filter (i.e. the
//      job isn't in the current period), fetch it from HCP and stuff
//      it into the list as a single row. Same as the old behavior.
//
// Building the haystack once per job (cached on `j._haystack` at load
// time) keeps the filter cheap on every keystroke even for big lists.
function buildHaystack(j) {
  const parts = [];
  if (j.invoice) parts.push(String(j.invoice));
  if (j.customer) parts.push(j.customer);
  if (j.description) parts.push(j.description);
  if (j.status) parts.push(j.status);
  if (j.jobId) parts.push(j.jobId);
  // Amount: include raw number, formatted with $, with comma, with cents
  const amt = Number(j.totalAmount || 0);
  if (amt) {
    parts.push(String(Math.round(amt)));
    parts.push(amt.toFixed(2));
    parts.push('$' + Math.round(amt));
    parts.push('$' + amt.toLocaleString('en-US'));
  }
  // Outstanding/unpaid amount — same treatment so "unpaid" + a $ matches
  const out = Number(j.outstanding || 0);
  if (out) {
    parts.push('unpaid');
    parts.push(String(Math.round(out)));
    parts.push('$' + Math.round(out));
  }
  // Date: ISO, US slash, month name (short + long), year
  if (j.kpiDate) {
    const d = new Date(j.kpiDate);
    if (!isNaN(d.getTime())) {
      const iso = d.toISOString().slice(0, 10);
      parts.push(iso);
      parts.push((d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear());
      parts.push((d.getMonth() + 1) + '/' + d.getDate());
      parts.push(d.toLocaleString('en-US', { month: 'long' }));
      parts.push(d.toLocaleString('en-US', { month: 'short' }));
      parts.push(String(d.getFullYear()));
    }
  }
  // Techs: HCP-assigned + reconciled assignments
  (j.hcpAssignedEmployees || []).forEach(n => n && parts.push(n));
  (j.assignments || []).forEach(a => a && a.name && parts.push(a.name));
  return parts.join(' ').toLowerCase();
}

function applyFilter() {
  const q = $('jobLookup').value.trim().toLowerCase();
  const rows = document.querySelectorAll('#jobsList .job');
  const total = rows.length;
  if (!q) {
    rows.forEach(r => r.style.display = '');
    $('filterCount').textContent = total ? total + ' jobs' : '';
    return;
  }
  // Multi-word: split on whitespace, every token must appear.
  const tokens = q.split(/\s+/).filter(Boolean);
  let shown = 0;
  rows.forEach(r => {
    const hay = r.dataset.haystack || '';
    const match = tokens.every(t => hay.indexOf(t) !== -1);
    r.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  $('filterCount').textContent = shown + ' of ' + total;
}

$('jobLookup').addEventListener('input', applyFilter);

$('lookupBtn').addEventListener('click', () => {
  const v = $('jobLookup').value.trim();
  if (!v) { alert('Type something to filter, or paste an invoice / job_xxx and hit Open exact.'); return; }
  // job_xxx in URL?
  const m = v.match(/job_[a-z0-9]+/i);
  if (m) { openLookedUpJob(m[0]); return; }
  // Pure invoice number?
  if (/^#?\d+$/.test(v)) { openLookedUpInvoice(v.replace(/^#/, '')); return; }
  openLookedUpInvoice(v);
});
$('jobLookup').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    // If the live filter has zero visible rows, treat Enter as
    // "Open exact" — try to fetch the typed value from HCP.
    const visible = Array.from(document.querySelectorAll('#jobsList .job'))
      .some(r => r.style.display !== 'none');
    if (!visible) $('lookupBtn').click();
  }
});

async function openLookedUpJob(jobId) {
  // Stuff the job into the list as a temporary single row and expand it
  try {
    const data = await api('/api/kpi/admin/job/' + encodeURIComponent(jobId));
    if (!data.job) throw new Error('No job returned');
    const synthRow = {
      jobId: data.job.id,
      invoice: data.job.invoice,
      customer: data.job.customer,
      description: data.job.description,
      totalAmount: data.job.totalAmount,
      outstanding: data.job.outstandingBalance,
      kpiDate: data.job.completedAt || data.job.scheduledStart,
      status: data.reconciliation ? (data.reconciliation.excluded ? 'excluded' : 'reconciled') : 'credited',
      hcpAssignedEmployees: data.job.assignedEmployees.map(e => e.name),
      assignments: data.reconciliation && data.reconciliation.assignments || [],
      _localKey: jobId
    };
    synthRow._haystack = buildHaystack(synthRow);
    window.JOBS[jobId] = synthRow;
    // Replace the list with this one row + clear the filter so it's
    // visible regardless of what the user had typed.
    $('jobLookup').value = '';
    $('filterCount').textContent = '';
    $('jobsList').innerHTML = renderJob(synthRow);
    // Auto-expand
    setTimeout(() => {
      const job = document.querySelector('.job[data-key="' + cssEscape(jobId) + '"]');
      if (job) {
        job.classList.add('is-open');
        renderEditPanel(jobId);
        const panel = job.querySelector('.job-edit');
        if (panel) panel.dataset.loaded = '1';
      }
    }, 50);
  } catch (err) {
    alert('Could not load job: ' + err.message);
  }
}
async function openLookedUpInvoice(invoice) {
  try {
    const r = await api('/api/kpi/admin/job-by-invoice?invoice=' + encodeURIComponent(invoice));
    if (!r.jobId) throw new Error('No HCP job linked to that invoice');
    await openLookedUpJob(r.jobId);
  } catch (err) {
    alert('Could not look up invoice: ' + err.message);
  }
}

// ── Issues + Locked tabs (kept simple) ───────────────────────────────
async function loadIssues() {
  try {
    const data = await api('/api/kpi/admin/issues');
    const reports = data.reports || [];
    $('issueCount').textContent = reports.filter(r => r.status === 'open').length;
    if (reports.length === 0) {
      $('issuesList').innerHTML = '<div class="empty">No issue reports yet.</div>';
      return;
    }
    // wrong_seller is the legacy type ID — kept here so any reports
    // saved before the rename still display with a friendly label.
    const TYPE_LABEL = {
      missing: 'Missing job', wrong_tech: 'Wrong tech', wrong_split: 'Wrong split',
      wrong_customer: 'Wrong customer', wrong_seller: 'Wrong customer',
      wrong_unpaid: 'Wrong unpaid amount', other: 'Other'
    };
    $('issuesList').innerHTML = reports.map(rep => {
      const ref = [rep.invoice && '#' + rep.invoice, rep.customer].filter(Boolean).join(' · ');
      const when = new Date(rep.createdAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      return `<div class="item-card">
        <div style="display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:4px">
          <strong>${esc(TYPE_LABEL[rep.type] || rep.type)}</strong>
          <span class="badge ${rep.status === 'open' ? 'badge--warn' : 'badge--good'}">${esc(rep.status)}</span>
          <span style="font-size:11px;color:var(--ink-mute)">${esc(rep.reporterName)} · ${esc(when)}</span>
        </div>
        ${ref ? '<div style="font-size:13px;color:var(--ink-soft);margin-bottom:4px">' + esc(ref) + '</div>' : ''}
        <div style="font-size:13px;padding:8px 10px;background:var(--bg);border-left:2px solid var(--border-strong);border-radius:4px;margin-bottom:8px">${esc(rep.description)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${rep.invoice ? '<button class="btn" data-action="from-issue-inv" data-inv="' + esc(rep.invoice) + '">Open job</button>' : ''}
          ${rep.status === 'open'
            ? '<button class="btn" data-action="issue-status" data-id="' + esc(rep.id) + '" data-newstatus="resolved">Mark resolved</button>'
              + '<button class="btn btn--danger" data-action="issue-status" data-id="' + esc(rep.id) + '" data-newstatus="dismissed">Dismiss</button>'
            : '<button class="btn" data-action="issue-status" data-id="' + esc(rep.id) + '" data-newstatus="open">Re-open</button>'}
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    $('issuesList').innerHTML = '<div class="empty">Error: ' + esc(err.message) + '</div>';
  }
}
// Issue actions via the same delegation
document.addEventListener('click', async (e) => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  if (t.dataset.action === 'issue-status') {
    try {
      await api('/api/kpi/admin/issues/' + t.dataset.id + '/status', {
        method: 'POST', body: { status: t.dataset.newstatus, by: 'admin' }
      });
      loadIssues();
    } catch (err) { alert(err.message); }
  }
  if (t.dataset.action === 'from-issue-inv') {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('is-active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('is-active'));
    document.querySelector('[data-panel="reconcile"]').classList.add('is-active');
    $('panel-reconcile').classList.add('is-active');
    $('jobLookup').value = t.dataset.inv;
    $('lookupBtn').click();
  }
});

// Locked records
$('loadLockedBtn').addEventListener('click', loadLocked);
async function loadLocked() {
  try {
    const month = $('monthFilter').value;
    const data = await api('/api/kpi/admin/reconciliations' + (month ? '?month=' + month : ''));
    const recs = data.reconciliations || [];
    $('lockedCount').textContent = recs.length;
    if (recs.length === 0) {
      $('lockedList').innerHTML = '<div class="empty">No reconciliations yet' + (month ? ' for ' + month : '') + '.</div>';
      return;
    }
    $('lockedList').innerHTML = recs.map(r => {
      const names = (r.assignments || []).map(a => a.employeeName + ' ' + a.creditPct + '%').join(' · ');
      const dateStr = r.kpiDate ? isoDate(r.kpiDate) : '—';
      return `<div class="item-card" style="display:grid;grid-template-columns:1fr 100px 90px;gap:10px;align-items:center">
        <div>
          <div style="font-weight:700;font-family:ui-monospace,monospace;font-size:12px;margin-bottom:4px">${esc(r.jobId)}</div>
          <div style="font-size:13px;color:var(--ink-soft)">${esc(names) || '<em>excluded</em>'}${r.totalAmount != null ? ' · ' + fmt(r.totalAmount) : ''}</div>
          ${r.notes ? '<div style="font-size:12px;color:var(--ink-mute);margin-top:3px">' + esc(r.notes) + '</div>' : ''}
        </div>
        <div style="font-size:11px;color:var(--ink-mute);text-align:right">${esc(dateStr)}</div>
        <button class="btn" data-action="open-locked" data-jobid="${esc(r.jobId)}">Edit</button>
      </div>`;
    }).join('');
  } catch (err) {
    $('lockedList').innerHTML = '<div class="empty">Error: ' + esc(err.message) + '</div>';
  }
}
document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-action="open-locked"]');
  if (!t) return;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('is-active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('is-active'));
  document.querySelector('[data-panel="reconcile"]').classList.add('is-active');
  $('panel-reconcile').classList.add('is-active');
  openLookedUpJob(t.dataset.jobid);
});
</script>
